<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Contract Review Agent — Vercel Eve template for AI contract review">
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#000000" />
			<stop offset="100%" stop-color="#0a0a0a" />
		</linearGradient>
		<radialGradient id="glow" cx="0.85" cy="0.15" r="0.7">
			<stop offset="0%" stop-color="#ffffff" stop-opacity="0.18" />
			<stop offset="60%" stop-color="#ffffff" stop-opacity="0.02" />
			<stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
		</radialGradient>
	</defs>
	<rect width="1200" height="630" fill="url(#bg)" />
	<rect width="1200" height="630" fill="url(#glow)" />

	<g transform="translate(80, 100)">
		<rect x="0" y="0" width="84" height="84" rx="16" fill="#ffffff" />
		<text x="42" y="60" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif" font-size="48" font-weight="800" text-anchor="middle" fill="#000000">CR</text>
	</g>

	<g transform="translate(190, 110)">
		<text font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="600" fill="#9ca3af" letter-spacing="2">VERCEL EVE TEMPLATE</text>
		<text x="0" y="92" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif" font-size="86" font-weight="800" fill="#ffffff">Contract Review Agent</text>
		<text x="0" y="148" font-family="ui-sans-serif, -apple-system, system-ui, sans-serif" font-size="32" font-weight="400" fill="#d1d5db">Open-source AI agent for PDF &amp; DOCX contract review</text>
		<text x="0" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" fill="#9ca3af">eve &middot; next.js &middot; ai-sdk-elements &middot; shadcn/ui</text>
	</g>

	<g transform="translate(80, 460)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" fill="#9ca3af">
		<rect x="0" y="-26" width="640" height="44" rx="8" fill="#0d0d0d" stroke="#262626" />
		<text x="20" y="6">$ npx vercel deploy</text>
	</g>

	<g transform="translate(780, 360)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#d1d5db">
		<rect x="0" y="0" width="340" height="220" rx="18" fill="#0d0d0d" stroke="#262626" />
		<text x="22" y="38" fill="#9ca3af">agent/</text>
		<text x="22" y="72" fill="#ffffff">instructions.md</text>
		<text x="22" y="106" fill="#9ca3af">skills/</text>
		<text x="42" y="138" fill="#ffffff">contract-review.md</text>
		<text x="22" y="172" fill="#9ca3af">tools/</text>
		<text x="42" y="204" fill="#ffffff">review_*.ts</text>
